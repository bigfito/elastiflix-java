<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}" lang="en">
<body>
<th:block th:fragment="main-content">
<div class="flex flex-col items-center justify-center min-h-[70vh] px-4 text-center">
    <div class="text-6xl mb-6">⚠️</div>
    <h1 class="text-2xl font-bold text-white mb-2" th:text="${errorTitle ?: 'Error'}"></h1>
    <p class="text-gray-400 mb-4" th:text="${errorMessage ?: 'An error occurred.'}"></p>
    <p th:if="${errorDetail != null}"
       class="text-gray-600 text-xs font-mono bg-gray-900 rounded px-4 py-2 max-w-lg mb-6"
       th:text="${errorDetail}"></p>
    <a href="/" class="bg-brand hover:bg-brand-dark text-white font-semibold px-6 py-3 rounded-lg transition">
        Back to Home
    </a>
</div>
</th:block>
</body>
</html>
