<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::main-content})}" lang="en">
<body>
<th:block th:fragment="main-content">
<div class="px-6 py-6 max-w-screen-xl mx-auto">

    <!-- Search Bar -->
    <form action="/search" method="get" class="mb-8">
        <div class="flex flex-col gap-6">
            <!-- Search input -->
            <div class="relative flex items-center">
                <input type="text" name="q"
                       th:value="${query}"
                       placeholder="Search for a movie..."
                       class="w-full bg-gray-800 text-white placeholder-gray-500 border border-gray-700 rounded-xl px-5 py-3 pr-28 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition"/>
                <button type="submit"
                        class="absolute right-2 bg-brand hover:bg-brand-dark text-white font-semibold px-5 py-2 rounded-lg transition text-sm">
                    Search
                </button>
            </div>

            <div class="flex flex-col md:flex-row gap-8">
                <!-- Left Sidebar: Filters & Sort -->
                <div class="md:w-64 bg-gray-800/50 border border-gray-700 rounded-xl p-4 flex flex-col gap-4 h-fit">
                    <div class="flex items-center justify-between">
                        <h3 class="text-sm font-semibold text-white">Refine</h3>
                        <a href="/search" class="text-[10px] text-gray-500 hover:text-brand transition uppercase tracking-wider">Clear All</a>
                    </div>

                    <div class="flex flex-col gap-4">
                        <!-- Mode Selector (Integrated in sidebar) -->
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase tracking-wider block mb-2">Search Mode</label>
                            <div class="flex flex-col gap-2">
                                <th:block th:each="m : ${modes}">
                                    <label class="flex items-center gap-2 cursor-pointer group">
                                        <input type="radio" name="mode"
                                               th:value="${m.name()}"
                                               th:checked="${m.name() == currentMode}"
                                               onchange="this.form.submit()"
                                               class="accent-brand"/>
                                        <span class="text-xs text-gray-400 group-hover:text-white transition"
                                              th:text="${m.label()}"></span>
                                    </label>
                                </th:block>
                            </div>
                        </div>

                        <div class="border-t border-gray-700/50 my-1"></div>

                        <!-- Sort -->
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase tracking-wider block mb-1.5">Sort By</label>
                            <select name="sort" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-brand transition" onchange="this.form.submit()">
                                <option value="">Relevance</option>
                                <option th:selected="${sort == 'RATING'}" value="RATING">Rating (High to Low)</option>
                                <option th:selected="${sort == 'YEAR'}" value="YEAR">Year (Newest first)</option>
                            </select>
                        </div>

                        <!-- Results per Page -->
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase tracking-wider block mb-1.5">Results per Page</label>
                            <select name="size" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-brand transition" onchange="this.form.submit()">
                                <option th:selected="${pageSize == 25}" value="25">25 results</option>
                                <option th:selected="${pageSize == 50}" value="50">50 results</option>
                                <option th:selected="${pageSize == 100}" value="100">100 results</option>
                            </select>
                        </div>

                        <div class="border-t border-gray-700/50 my-1"></div>

                        <!-- Year -->
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase tracking-wider block mb-1.5">Release Year</label>
                            <select name="year"
                                    class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-brand transition disabled:opacity-50"
                                    onchange="this.form.submit()"
                                    th:disabled="${#lists.isEmpty(availableYears)}">
                                <option value="">All Years</option>
                                <option th:each="y : ${availableYears}"
                                        th:value="${y}"
                                        th:text="${y}"
                                        th:selected="${selectedYear != null and selectedYear == y}"></option>
                            </select>
                        </div>

                        <!-- Rating -->
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase tracking-wider block mb-1.5">Rating</label>
                            <select name="rating" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-brand transition" onchange="this.form.submit()">
                                <option value="">All Ratings</option>
                                <option th:selected="${selectedRating == 'G'}" value="G">G</option>
                                <option th:selected="${selectedRating == 'PG'}" value="PG">PG</option>
                                <option th:selected="${selectedRating == 'PG-13'}" value="PG-13">PG-13</option>
                                <option th:selected="${selectedRating == 'R'}" value="R">R</option>
                                <option th:selected="${selectedRating == 'NC-17'}" value="NC-17">NC-17</option>
                            </select>
                        </div>

                        <!-- Genres -->
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase tracking-wider block mb-1.5">Genre</label>
                            <select name="genres"
                                    class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-brand transition disabled:opacity-50"
                                    onchange="this.form.submit()"
                                    th:disabled="${#lists.isEmpty(availableGenres)}">
                                <option value="">All Genres</option>
                                <option th:each="g : ${availableGenres}"
                                        th:value="${g}"
                                        th:text="${g}"
                                        th:selected="${selectedGenres != null and not #lists.isEmpty(selectedGenres) and selectedGenres[0] == g}"></option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Right Side: Results -->
                <div class="flex-1">
                    <!-- Top bar for Results: View Switcher and Count -->
                    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                        <div th:if="${results != null}">
                            <p class="text-gray-400 text-sm">
                                Showing
                                <span class="text-white font-semibold" th:text="${results.fromIndex}"></span>–<span class="text-white font-semibold" th:text="${results.toIndex}"></span>
                                of
                                <span class="text-white font-semibold" th:text="${results.totalHits}"></span>
                                results
                            </p>
                        </div>
                        <div th:if="${results == null}" class="text-gray-500 text-sm">
                            Ready to discover movies.
                        </div>

                        <!-- View Switcher -->
                        <div class="flex items-center bg-gray-800 rounded-lg p-1 border border-gray-700">
                            <label class="cursor-pointer">
                                <input type="radio" name="view" value="grid" th:checked="${view == 'grid'}" class="hidden peer" onchange="this.form.submit()"/>
                                <span class="px-3 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 peer-checked:bg-gray-700 peer-checked:text-white text-gray-500 hover:text-gray-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                                    Grid
                                </span>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="view" value="list" th:checked="${view == 'list'}" class="hidden peer" onchange="this.form.submit()"/>
                                <span class="px-3 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 peer-checked:bg-gray-700 peer-checked:text-white text-gray-500 hover:text-gray-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                                    List
                                </span>
                            </label>
                        </div>
                    </div>

                    <!-- Inference endpoint error -->
                    <div th:if="${searchError != null}"
                         class="flex items-start gap-4 bg-yellow-950 border border-yellow-700 text-yellow-300 rounded-xl px-6 py-5 mb-6">
                        <span class="text-2xl shrink-0">⚠️</span>
                        <div>
                            <p class="font-semibold mb-1">Inference endpoint not available</p>
                            <p class="text-sm text-yellow-400" th:text="${searchError}"></p>
                        </div>
                    </div>

                    <!-- No query state -->
                    <div th:if="${results == null and searchError == null}" class="text-center text-gray-500 py-24 text-lg border border-dashed border-gray-700 rounded-2xl">
                        Enter a search term to find movies.
                    </div>

                    <!-- Results -->
                    <th:block th:if="${results != null}">
                        <!-- Empty state -->
                        <div th:if="${#lists.isEmpty(results.movies)}"
                             class="text-center text-gray-500 py-24 text-lg border border-dashed border-gray-700 rounded-2xl">
                            No movies found for "<span th:text="${query}"></span>". Try a different query or search mode.
                        </div>

                        <!-- Movie Grid/List -->
                        <div th:if="${not #lists.isEmpty(results.movies)}">
                            <!-- Grid View -->
                            <div th:if="${view == 'grid'}"
                                 class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mb-8">
                                <th:block th:each="movie : ${results.movies}">
                                    <div th:replace="~{fragments/movie-card :: card(${movie}, ${query}, ${currentMode}, ${results.currentPage})}"></div>
                                </th:block>
                            </div>

                            <!-- List View -->
                            <div th:if="${view == 'list'}" class="flex flex-col gap-4 mb-8">
                                <th:block th:each="movie : ${results.movies}">
                                    <div th:replace="~{fragments/movie-list-item :: item(${movie}, ${query}, ${currentMode}, ${results.currentPage})}"></div>
                                </th:block>
                            </div>

                            <!-- Pagination -->
                            <div th:if="${results.totalPages > 1}"
                                 class="flex items-center justify-center gap-1 flex-wrap pb-8">

                                <!-- Previous -->
                                <a th:if="${results.hasPreviousPage()}"
                                   th:href="@{/search(q=${query}, mode=${currentMode}, page=${results.currentPage - 1}, size=${pageSize}, view=${view}, sort=${sort}, year=${selectedYear}, rating=${selectedRating}, genres=${selectedGenres})}"
                                   class="px-3 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm transition">
                                    &laquo;
                                </a>

                                <!-- Page numbers -->
                                <th:block th:with="start=${T(java.lang.Math).max(1, results.currentPage - 3)},
                                                   end=${T(java.lang.Math).min(results.totalPages, results.currentPage + 3)}">
                                    <a th:if="${start > 1}"
                                       th:href="@{/search(q=${query}, mode=${currentMode}, page=1, size=${pageSize}, view=${view}, sort=${sort}, year=${selectedYear}, rating=${selectedRating}, genres=${selectedGenres})}"
                                       class="px-3 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm transition">1</a>
                                    <span th:if="${start > 2}" class="text-gray-600 px-1">…</span>

                                    <th:block th:each="p : ${#numbers.sequence(start, end)}">
                                        <a th:href="@{/search(q=${query}, mode=${currentMode}, page=${p}, size=${pageSize}, view=${view}, sort=${sort}, year=${selectedYear}, rating=${selectedRating}, genres=${selectedGenres})}"
                                           th:text="${p}"
                                           th:classappend="${p == results.currentPage} ? 'bg-brand text-white' : 'bg-gray-800 hover:bg-gray-700 text-gray-300'"
                                           class="px-3 py-2 rounded-lg text-sm transition font-medium">1</a>
                                    </th:block>

                                    <span th:if="${end < results.totalPages - 1}" class="text-gray-600 px-1">…</span>
                                    <a th:if="${end < results.totalPages}"
                                       th:href="@{/search(q=${query}, mode=${currentMode}, page=${results.totalPages}, size=${pageSize}, view=${view}, sort=${sort}, year=${selectedYear}, rating=${selectedRating}, genres=${selectedGenres})}"
                                       th:text="${results.totalPages}"
                                       class="px-3 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm transition"></a>
                                </th:block>

                                <!-- Next -->
                                <a th:if="${results.hasNextPage()}"
                                   th:href="@{/search(q=${query}, mode=${currentMode}, page=${results.currentPage + 1}, size=${pageSize}, view=${view}, sort=${sort}, year=${selectedYear}, rating=${selectedRating}, genres=${selectedGenres})}"
                                   class="px-3 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm transition">
                                    &raquo;
                                </a>
                            </div>
                        </div>
                    </th:block>
                </div>
            </div>
        </div>
    </form>
</div>
</th:block>
</body>
</html>
